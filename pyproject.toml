[project]
name = "harness-design-loop"
version = "0.0.1"
description = "A loop for AI product research: a coding agent runs experiments, a PM steers the goal."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
hdl = "harness_design_loop.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
