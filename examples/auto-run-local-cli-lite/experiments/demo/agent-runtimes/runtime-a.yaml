id: runtime-a
connector:
  type: local_cli
  # stdin_json: AHL sends {"input": ...} per line, reads {"response": ...} per line.
  # `python3` must be on PATH; on Windows without python3 use `py agent.py`.
  command: python3 agent.py
  working_dir: ./harnesses/A
  timeout: 30
artifacts:
  collect:
    - id: answer
      glob: "produced/**"
      required: false
