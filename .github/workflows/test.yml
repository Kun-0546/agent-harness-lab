name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Supported range is 3.10–3.12 (3.13 is pinned out pending an unresolved hang).
      # CI runs the newest supported version; one Linux job is enough for the MVP.
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests -t .

      - name: Public MVP verification
        run: PYTHON=python bash scripts/verify_public_mvp.sh

      - name: Public completion verification
        run: bash scripts/verify_public_completion.sh
