name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Supported range is 3.10–3.12 (3.13 is pinned out pending an unresolved hang).
      # CI runs the full supported range on Linux and macOS (6 jobs).
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests -t .

      # Verify scripts are Linux-only for now: the macOS/BSD toolchain is unvalidated.
      - name: Public MVP verification
        if: matrix.os == 'ubuntu-latest'
        run: PYTHON=python bash scripts/verify_public_mvp.sh

      - name: Public completion verification
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/verify_public_completion.sh
