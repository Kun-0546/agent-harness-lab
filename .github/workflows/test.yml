name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests -t .

      - name: Public MVP verification
        run: PYTHON=python bash scripts/verify_public_mvp.sh
